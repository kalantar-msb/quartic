inferenceExtension:
  replicas: 1
  image:
    name: llm-d-inference-scheduler
    registry: ghcr.io
    repository: kalantar/llm-d-router
    tag: quartic-mk-quarticceiling
    pullPolicy: Always
  extProcPort: 9002
  extraContainerPorts:
    - name: zmq
      containerPort: 5557
      protocol: TCP
  extraServicePorts:
    - name: zmq
      port: 5557
      targetPort: 5557
      protocol: TCP
  env:
    - name: HF_TOKEN
      valueFrom:
        secretKeyRef:
          name: hf-secret
          key: HF_TOKEN
  pluginsConfigFile: "custom-plugins.yaml"
  pluginsCustomConfig:
    custom-plugins.yaml: |
      apiVersion: llm-d.ai/v1alpha1
      kind: EndpointPickerConfig
      featureGates:
        - flowControl
      plugins:
        - type: quartic-ceiling-policy
          name: quartic-ceiling
        - type: queue-scorer
        - type: kv-cache-utilization-scorer
        - type: prefix-cache-scorer
      schedulingProfiles:
        - name: default
          plugins:
            - pluginRef: queue-scorer
              weight: 2.0
            - pluginRef: kv-cache-utilization-scorer
              weight: 2.0
            - pluginRef: prefix-cache-scorer
              weight: 3.0
      flowControl:
        usageLimitPolicyPluginRef: "quartic-ceiling"

  monitoring:
    interval: "10s"
    prometheus:
      enabled: true
      auth:
        enabled: true
        # Overridable Secret name for the Prometheus ServiceAccount token.
        # The gaie (inferencepool) chart v1.4.0 uses this exact path; older
        # templates wrote `monitoring.secret.name` which the chart silently
        # ignored and fell back to its hardcoded default, causing
        # cross-release Helm ownership conflicts in multi-stack scenarios.
        secretName: inference-gateway-sa-metrics-reader-secret
  flags:
    v: "5"

inferencePool:
  targetPortNumber: 8000
  modelServerType: vllm
  apiVersion: "inference.networking.k8s.io/v1"
  modelServers:
    matchLabels:
      llm-d.ai/inferenceServing: "true"
      llm-d.ai/model: qwen-qwe-6986e55e-wen3-14b

provider:
  name: istio

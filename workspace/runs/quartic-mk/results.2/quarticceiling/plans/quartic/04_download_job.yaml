apiVersion: batch/v1
kind: Job
metadata:
  name: download-model
  namespace: kalantar-3
spec:
  backoffLimit: 3
  template:
    metadata:
      namespace: kalantar-3
      labels:
        app: llm-d-benchmark-harness
    spec:
      containers:
        - name: downloader
          image: ghcr.io/llm-d/llm-d-benchmark:v0.6.3
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p "${MOUNT_PATH}/${MODEL_PATH}" && \
              pip install huggingface_hub && \
              export PATH="${PATH}:${HOME}/.local/bin" && \
              hf auth login --token "${HF_TOKEN}" && \
              hf download "${HF_MODEL_ID}" --local-dir "/cache/${MODEL_PATH}"
          env:
            - name: MODEL_PATH
              value: models/Qwen/Qwen3-14B
            - name: HF_MODEL_ID
              value: Qwen/Qwen3-14B
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-secret
                  key: HF_TOKEN
            - name: HF_HOME
              value: /tmp/huggingface
            - name: HOME
              value: /tmp
            - name: MOUNT_PATH
              value: /cache
          volumeMounts:
            - name: model-cache
              mountPath: /cache
      restartPolicy: OnFailure
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-pvc

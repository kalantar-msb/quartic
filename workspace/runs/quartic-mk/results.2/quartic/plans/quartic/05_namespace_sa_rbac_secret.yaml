apiVersion: v1
kind: Namespace
metadata:
  name: kalantar-0
  labels:
    kubernetes.io/metadata.name: kalantar-0
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/warn-version: latest
spec:
  finalizers:
  - kubernetes
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inference-perf-runner
  namespace: kalantar-0
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: inference-perf-job-creator
  namespace: kalantar-0
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete", "patch", "update"]
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: inference-perf-job-creator-binding
  namespace: kalantar-0
subjects:
- kind: ServiceAccount
  name: inference-perf-runner
  namespace: kalantar-0
roleRef:
  kind: Role
  name: inference-perf-job-creator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: inference-perf-restricted-scc
  namespace: kalantar-0
subjects:
- kind: ServiceAccount
  name: inference-perf-runner
  namespace: kalantar-0
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:restricted
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: hf-secret
  namespace: kalantar-0
stringData:
  HF_TOKEN: "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"

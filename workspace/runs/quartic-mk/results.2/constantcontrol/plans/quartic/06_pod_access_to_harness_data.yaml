apiVersion: v1
kind: Pod
metadata:
  name: access-to-harness-data-workload-pvc
  labels:
    app: llm-d-benchmark-harness
    role: llm-d-benchmark-data-access
  namespace: kalantar-0
spec:
  containers:
  - name: rsync
    image: ghcr.io/llm-d/llm-d-benchmark:v0.6.3
    imagePullPolicy: Always
    securityContext:
      runAsUser: 0
    command: ["rsync", "--daemon", "--no-detach", "--port=20873", "--log-file=/dev/stdout"]
    volumeMounts:
    - name: requests
      mountPath: /requests
  volumes:
  - name: requests
    persistentVolumeClaim:
      claimName: workload-pvc

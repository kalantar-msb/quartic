helmDefaults:
  createNamespace: false
---

repositories:
  - name: llm-d-modelservice
    url: https://llm-d-incubation.github.io/llm-d-modelservice/
  - name: llm-d-infra
    url: https://llm-d-incubation.github.io/llm-d-infra/

releases:
  - name: infra-llmdbench
    namespace: kalantar-0
    chart: llm-d-infra/llm-d-infra
    version: v1.4.0
    installed: true
    labels:
      type: infrastructure
      kind: inference-stack
    values:
      - infra.yaml

  - name: qwen-qwe-079d55ee-wen3-14b-ms
    namespace: kalantar-0
    chart: llm-d-modelservice/llm-d-modelservice
    version: v0.4.13
    installed: true
    needs:
      - kalantar-0/infra-llmdbench
      - kalantar-0/qwen-qwe-079d55ee-wen3-14b-gaie
    values:
      - ms-values.yaml
    labels:
      kind: inference-stack

  - name: qwen-qwe-079d55ee-wen3-14b-gaie
    namespace: kalantar-0
    chart: oci://registry.k8s.io/gateway-api-inference-extension/charts/inferencepool
    version: v1.5.0
    installed: true
    needs:
      - kalantar-0/infra-llmdbench
    values:
      - gaie-values.yaml
    labels:
      kind: inference-stack
